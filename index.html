<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Digital - Pediu Food</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f37021;
            --bg: #f8f9fa;
            --text: #333;
            --card-bg: #fff;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; min-height: 100vh; }

        header {
            background: #1a1a1a; color: white; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 110;
        }
        .logo { font-weight: 800; font-size: 1.2rem; color: var(--primary); }
        .cart-btn { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; position: relative; }
        .cart-badge { position: absolute; top: -5px; right: -8px; background: var(--primary); color: white; font-size: 10px; padding: 2px 6px; border-radius: 50%; font-weight: bold; }

        .controls-section {
            padding: 15px; background: #fff; position: sticky; top: 58px; z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .search-container input {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 12px; outline: none;
        }
        .filter-chips { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .chip { white-space: nowrap; background: #eee; padding: 8px 18px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; cursor: pointer; border: none; color: #555; }
        .chip.active { background: var(--primary); color: white; }

        .container { padding: 15px; }
        .grid-produtos { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); display: flex; flex-direction: column; }
        .card img { width: 100%; height: 130px; object-fit: cover; background: #eee; }
        .card-body { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-body h3 { font-size: 0.95rem; margin-bottom: 8px; min-height: 40px; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .preco { font-weight: 700; color: var(--primary); }
        .btn-add { background: var(--primary); color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: 600; }

        #side-cart {
            position: fixed; top: 0; right: -110%; width: 90%; max-width: 400px; height: 100%;
            background: white; z-index: 200; transition: 0.4s; display: flex; flex-direction: column;
        }
        #side-cart.open { right: 0; }
        .cart-header { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .cart-items-list { flex-grow: 1; overflow-y: auto; padding: 20px; }
        .cart-item { margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #f5f5f5; }
        .qtd-btn-group { display: flex; align-items: center; gap: 15px; margin-top: 8px; background: #f1f1f1; width: fit-content; padding: 6px 15px; border-radius: 10px; }
        .qtd-btn-group button { border: none; background: none; color: var(--primary); font-weight: 800; font-size: 1.3rem; cursor: pointer; }

        /* Modal de Personalização */
        #modal-detalhes {
            position: fixed; bottom: -110%; left: 0; width: 100%; height: 90%;
            background: white; z-index: 300; border-radius: 25px 25px 0 0;
            transition: 0.4s cubic-bezier(0.25, 1, 0.5, 1); padding: 20px;
            display: flex; flex-direction: column;
        }
        #modal-detalhes.open { bottom: 0; }
        .modal-scroll { overflow-y: auto; flex-grow: 1; margin: 10px 0; }
        .section-title { font-size: 0.8rem; font-weight: 800; color: #777; margin: 15px 0 8px 0; text-transform: uppercase; letter-spacing: 1px; }
        .opcao-row { 
            display: flex; align-items: center; justify-content: space-between; 
            background: #f9f9f9; padding: 14px; border-radius: 12px; margin-bottom: 6px; 
            cursor: pointer; font-size: 0.95rem; border: 1px solid transparent;
        }
        .opcao-row:active { background: #f0f0f0; }
        .opcao-row input { width: 20px; height: 20px; accent-color: var(--primary); }
        
        /* Seletor de Qtd no Modal */
        .modal-footer { border-top: 1px solid #eee; padding-top: 15px; }
        .modal-qtd-selector {
            display: flex; justify-content: center; align-items: center; gap: 25px;
            margin-bottom: 15px; font-weight: 700; font-size: 1.1rem;
        }
        .modal-qtd-selector button {
            width: 40px; height: 40px; border-radius: 50%; border: 2px solid #ddd;
            background: white; font-size: 1.5rem; color: var(--primary); cursor: pointer;
        }

        .btn-confirmar { background: #25d366; color: white; border: none; padding: 18px; border-radius: 15px; font-weight: bold; font-size: 1rem; cursor: pointer; width: 100%; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 150; display: none; backdrop-filter: blur(4px); }
        .overlay.active { display: block; }
        #loader { text-align: center; padding: 50px; color: #888; font-weight: 600; }
    </style>
</head>
<body>

    <header>
        <div class="logo">PEDIU-FOOD</div>
        <button class="cart-btn" onclick="toggleCart()">
            🛒 <span class="cart-badge" id="cart-count">0</span>
        </button>
    </header>

    <section class="controls-section">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="O que você deseja hoje?" oninput="filtrarProdutos()">
        </div>
        <div class="filter-chips">
            <button class="chip active" onclick="setFilter('Guarnições', this)">🍟 Guarnições</button>
            <button class="chip" onclick="setFilter('Bebidas', this)">🥤 Bebidas</button>
            <button class="chip" onclick="setFilter('Doces', this)">🍰 Doces</button>
        </div>
    </section>

    <main class="container">
        <div id="loader">Carregando cardápio...</div>
        <div id="cardapio-grid" class="grid-produtos"></div>
    </main>

    <div class="overlay" id="overlay" onclick="closeAll()"></div>

    <div id="side-cart">
        <div class="cart-header">
            <h3>Seu Pedido</h3>
            <button onclick="toggleCart()" style="border:none; background:none; font-size:1.5rem;">✕</button>
        </div>
        <div class="cart-items-list" id="cart-list"></div>
        <div style="padding: 20px; border-top: 2px solid #eee;">
            <div style="display: flex; justify-content: space-between; font-weight: 800; font-size: 1.2rem; margin-bottom: 15px;">
                <span>Total:</span>
                <span id="total-val">R$ 0,00</span>
            </div>
            <button class="btn-confirmar" onclick="enviarPedido()">Finalizar no WhatsApp</button>
        </div>
    </div>

    <div id="modal-detalhes">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 id="modal-titulo" style="font-size: 1.2rem;">Personalizar</h2>
            <button onclick="closeModal()" style="border:none; background:none; font-size:1.8rem;">✕</button>
        </div>
        
        <div class="modal-scroll" id="modal-corpo">
            </div>

        <div class="modal-footer">
            <p style="text-align: center; color: #888; font-size: 0.8rem; margin-bottom: 10px;">Quantidade deste item:</p>
            <div class="modal-qtd-selector">
                <button onclick="mudarQtdModal(-1)">−</button>
                <span id="modal-qtd-val">1</span>
                <button onclick="mudarQtdModal(1)">+</button>
            </div>
            <button class="btn-confirmar" id="btn-final-add">Adicionar ao Carrinho</button>
        </div>
    </div>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTwMzPb9pdNIZENQF5fKwG534op_UQmmYxMscfe3jwaqUopg7ALGMEASTmQiPlmWZNMyhBDMDO68F1M/pub?output=csv";
        const SEU_TELEFONE = "5585987018832"; 

        let todosProdutos = [];
        let filtroCategoriaAtiva = 'Guarnições'; 
        let carrinho = {};
        let itemSendoEditado = null;
        let qtdNoModal = 1;

        async function carregarDados() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                const linhas = data.split('\n').filter(l => l.trim() !== "");
                
                todosProdutos = linhas.slice(1).map(linha => {
                    const colunas = linha.split(',');
                    return {
                        nome: colunas[0]?.trim() || "",
                        preco: parseFloat(colunas[1]),
                        categoria: colunas[2]?.trim() || "Outros",
                        img: colunas[3]?.trim() || "",
                        opcionais: colunas[4] ? colunas[4].trim().split(';') : [],
                        tamanhos: colunas[5] ? colunas[5].trim().split(';') : [],
                        sabores: colunas[6] ? colunas[6].trim().split(';') : []
                    };
                }).filter(p => !isNaN(p.preco));

                document.getElementById('loader').style.display = 'none';
                filtrarProdutos();
            } catch (error) {
                document.getElementById('loader').innerText = "Erro ao carregar cardápio.";
            }
        }

        function setFilter(cat, el) {
            filtroCategoriaAtiva = cat;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            filtrarProdutos();
        }

        function filtrarProdutos() {
            const termo = document.getElementById('search-input').value.toLowerCase();
            const filtrados = todosProdutos.filter(p => 
                p.categoria.toLowerCase() === filtroCategoriaAtiva.toLowerCase() &&
                p.nome.toLowerCase().includes(termo)
            );
            renderizar(filtrados);
        }

        function renderizar(lista) {
            const grid = document.getElementById('cardapio-grid');
            grid.innerHTML = lista.map(p => `
                <article class="card">
                    <img src="${p.img || 'https://via.placeholder.com/300?text=S-Imagem'}" alt="${p.nome}">
                    <div class="card-body">
                        <h3>${p.nome}</h3>
                        <div class="card-footer">
                            <span class="preco">R$ ${p.preco.toFixed(2).replace('.', ',')}</span>
                            <button class="btn-add" onclick="openModal('${p.nome}')">Pedir</button>
                        </div>
                    </div>
                </article>
            `).join('');
        }

        function openModal(nomeProduto) {
            const p = todosProdutos.find(item => item.nome === nomeProduto);
            if (!p) return;

            itemSendoEditado = p;
            qtdNoModal = 1; // Reseta qtd ao abrir
            document.getElementById('modal-qtd-val').innerText = qtdNoModal;
            document.getElementById('modal-titulo').innerText = p.nome;
            
            const corpo = document.getElementById('modal-corpo');
            corpo.innerHTML = '';

            // 1. TAMANHOS (Coluna F)
            if (p.tamanhos.length > 0 && p.tamanhos[0] !== "") {
                corpo.innerHTML += `<div class="section-title">Escolha o Tamanho:</div>`;
                p.tamanhos.forEach((tam, index) => {
                    corpo.innerHTML += `<label class="opcao-row"><span>${tam}</span><input type="radio" name="radio-tamanho" value="${tam}" ${index === 0 ? 'checked' : ''}></label>`;
                });
            }

            // 2. SABORES (Coluna G)
            if (p.sabores.length > 0 && p.sabores[0] !== "") {
                corpo.innerHTML += `<div class="section-title">Escolha o Sabor:</div>`;
                p.sabores.forEach((sabor, index) => {
                    corpo.innerHTML += `<label class="opcao-row"><span>${sabor}</span><input type="radio" name="radio-sabor" value="${sabor}" ${index === 0 ? 'checked' : ''}></label>`;
                });
            }

            // 3. OPCIONAIS (Coluna E)
            if (p.opcionais.length > 0 && p.opcionais[0] !== "") {
                corpo.innerHTML += `<div class="section-title">Opcionais:</div>`;
                p.opcionais.forEach(op => {
                    corpo.innerHTML += `<label class="opcao-row"><span>${op}</span><input type="checkbox" class="check-opcional" value="${op}"></label>`;
                });
            }

            document.getElementById('modal-detalhes').classList.add('open');
            document.getElementById('overlay').classList.add('active');
            document.getElementById('btn-final-add').onclick = adicionarAoCarrinho;
        }

        // Função para aumentar/diminuir dentro do modal
        function mudarQtdModal(delta) {
            qtdNoModal += delta;
            if (qtdNoModal < 1) qtdNoModal = 1;
            document.getElementById('modal-qtd-val').innerText = qtdNoModal;
        }

        function adicionarAoCarrinho() {
            const tam = document.querySelector('input[name="radio-tamanho"]:checked')?.value || "";
            const sab = document.querySelector('input[name="radio-sabor"]:checked')?.value || "";
            const ops = [];
            document.querySelectorAll('.check-opcional:checked').forEach(el => ops.push(el.value));
            
            const extras = [tam, sab, ...ops].filter(x => x !== "").join(', ');
            const idUnico = itemSendoEditado.nome + extras;

            if (carrinho[idUnico]) {
                carrinho[idUnico].qtd += qtdNoModal;
            } else {
                carrinho[idUnico] = {
                    nome: itemSendoEditado.nome,
                    preco: itemSendoEditado.preco,
                    qtd: qtdNoModal,
                    detalhes: extras
                };
            }

            renderCart();
            closeAll();
        }

        function renderCart() {
            const container = document.getElementById('cart-list');
            const totalText = document.getElementById('total-val');
            const badge = document.getElementById('cart-count');
            
            container.innerHTML = '';
            let total = 0, qtdTotal = 0;

            for (let id in carrinho) {
                let item = carrinho[id];
                total += item.preco * item.qtd;
                qtdTotal += item.qtd;
                container.innerHTML += `
                    <div class="cart-item">
                        <div>
                            <strong>${item.nome}</strong><br>
                            ${item.detalhes ? `<small style="color:#666">✓ ${item.detalhes}</small>` : ''}
                            <br><strong>R$ ${item.preco.toFixed(2).replace('.', ',')}</strong>
                        </div>
                        <div class="qtd-btn-group">
                            <button onclick="mudarQtdCarrinho('${id}', -1)">−</button>
                            <span>${item.qtd}</span>
                            <button onclick="mudarQtdCarrinho('${id}', 1)">+</button>
                        </div>
                    </div>`;
            }

            badge.innerText = qtdTotal;
            totalText.innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
            if (qtdTotal === 0) container.innerHTML = '<p style="text-align:center; color:#999; margin-top:30px;">Vazio</p>';
        }

        function mudarQtdCarrinho(id, delta) {
            carrinho[id].qtd += delta;
            if (carrinho[id].qtd <= 0) delete carrinho[id];
            renderCart();
        }

        function toggleCart() {
            document.getElementById('side-cart').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function closeModal() {
            document.getElementById('modal-detalhes').classList.remove('open');
            document.getElementById('overlay').classList.remove('active');
        }

        function closeAll() {
            closeModal();
            document.getElementById('side-cart').classList.remove('open');
            document.getElementById('overlay').classList.remove('active');
        }

        function enviarPedido() {
            if (Object.keys(carrinho).length === 0) return;

            let totalGeral = 0;
            let texto = "🚀 *NOVO PEDIDO - PEDIU FOOD* %0A%0A";

            for (let id in carrinho) {
                let item = carrinho[id];
                let subtotal = item.preco * item.qtd;
                texto += `*${item.qtd}x ${item.nome}*%0A`;
                if(item.detalhes) texto += `   _Detalhes: ${item.detalhes}_%0A`;
                texto += `   Subtotal: R$ ${subtotal.toFixed(2).replace('.', ',')}%0A%0A`;
                totalGeral += subtotal;
            }

            texto += `💰 *TOTAL: R$ ${totalGeral.toFixed(2).replace('.', ',')}*`;
            window.open(`https://wa.me/${SEU_TELEFONE}?text=${texto}`, '_blank');
        }

        carregarDados();
    </script>
</body>
    </html>

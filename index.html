<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Digital - Pediu Food</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f37021;
            --bg: #f8f9fa;
            --text: #333;
            --card-bg: #fff;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; min-height: 100vh; }

        /* Header Fixo */
        header {
            background: #1a1a1a;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 110;
        }
        .logo { font-weight: 800; font-size: 1.2rem; color: var(--primary); }
        .cart-btn { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; position: relative; }
        .cart-badge { position: absolute; top: -5px; right: -8px; background: var(--primary); color: white; font-size: 10px; padding: 2px 6px; border-radius: 50%; font-weight: bold; }

        /* Seção de Controles Fixa */
        .controls-section {
            padding: 15px;
            background: #fff;
            position: sticky;
            top: 58px;
            z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .search-container { margin-bottom: 12px; }
        .search-container input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
            font-size: 1rem;
            background: #fdfdfd;
        }

        .filter-chips {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none;
        }
        .filter-chips::-webkit-scrollbar { display: none; }

        .chip {
            white-space: nowrap;
            background: #eee;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s;
            color: #555;
        }

        .chip.active { background: var(--primary); color: white; }

        /* Grid de Produtos */
        .container { padding: 15px; }
        .grid-produtos { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 15px; 
            margin-top: 10px;
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: var(--shadow); 
            display: flex; 
            flex-direction: column;
        }
        .card img { width: 100%; height: 130px; object-fit: cover; background: #eee; }
        .card-body { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-body h3 { font-size: 0.95rem; margin-bottom: 8px; color: #222; min-height: 40px; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .preco { font-weight: 700; color: var(--primary); font-size: 1rem; }
        .btn-add-simple { background: var(--primary); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: 600; }

        /* Carrinho Lateral */
        #side-cart {
            position: fixed;
            top: 0; right: -100%;
            width: 85%; max-width: 380px; height: 100%;
            background: white;
            box-shadow: -5px 0 15px rgba(0,0,0,0.2);
            z-index: 200;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
        }
        #side-cart.open { right: 0; }
        .cart-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .cart-items-list { flex-grow: 1; overflow-y: auto; padding: 20px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #f9f9f9; }
        .qtd-btn-group { display: flex; align-items: center; gap: 12px; background: #f0f0f0; padding: 5px 10px; border-radius: 8px; }
        .qtd-btn-group button { border: none; background: none; font-weight: bold; font-size: 1.1rem; color: var(--primary); cursor: pointer; }
        .cart-footer-inside { padding: 20px; border-top: 2px solid #eee; background: #fff; }
        .total-price { font-size: 1.2rem; font-weight: 800; margin-bottom: 15px; display: flex; justify-content: space-between; }
        .btn-finish { background: #25d366; color: white; text-align: center; padding: 15px; border-radius: 10px; text-decoration: none; display: block; font-weight: bold; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 150; display: none; backdrop-filter: blur(2px); }
        .overlay.active { display: block; }
        #loader { text-align: center; padding: 50px; color: #888; font-weight: 600; }
    </style>
</head>
<body>

    <header>
        <div class="logo">PEDIU-FOOD</div>
        <button class="cart-btn" onclick="toggleCart()">
            🛒 <span class="cart-badge" id="cart-count">0</span>
        </button>
    </header>

    <section class="controls-section">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="O que vamos pedir?" oninput="filtrarProdutos()">
        </div>
        <div class="filter-chips">
            <button class="chip active" onclick="setFilter('todos', this)">🍔 Tudo</button>
            <button class="chip" onclick="setFilter('Bebidas', this)">🥤 Bebidas</button>
            <button class="chip" onclick="setFilter('Guarnições', this)">🍟 Guarnições</button>
            <button class="chip" onclick="setFilter('Doces', this)">🍰 Doces</button>
        </div>
    </section>

    <main class="container">
        <div id="loader">Carregando cardápio...</div>
        <div id="cardapio-grid" class="grid-produtos"></div>
    </main>

    <div class="overlay" id="overlay" onclick="toggleCart()"></div>
    <div id="side-cart">
        <div class="cart-header">
            <h3>Meu Pedido</h3>
            <button onclick="toggleCart()" style="background:none; border:none; font-size: 1.5rem; cursor:pointer;">✕</button>
        </div>
        <div class="cart-items-list" id="cart-list">
            <p style="color:#999; text-align:center; margin-top: 50px;">Seu carrinho está vazio.</p>
        </div>
        <div class="cart-footer-inside" id="cart-footer" style="display: none;">
            <div class="total-price">
                <span>Total:</span>
                <span id="total-val">R$ 0,00</span>
            </div>
            <a href="#" class="btn-finish" onclick="enviarPedido()">Finalizar no WhatsApp</a>
        </div>
    </div>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTwMzPb9pdNIZENQF5fKwG534op_UQmmYxMscfe3jwaqUopg7ALGMEASTmQiPlmWZNMyhBDMDO68F1M/pub?output=csv";
        const SEU_TELEFONE = "5585987018832"; 

        let todosProdutos = [];
        let filtroCategoriaAtiva = 'todos';
        let carrinho = {};

        async function carregarDados() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                const linhas = data.split('\n').filter(l => l.trim() !== "");
                
                todosProdutos = linhas.slice(1).map(linha => {
                    const colunas = linha.split(',');
                    return {
                        nome: colunas[0]?.trim() || "",
                        preco: parseFloat(colunas[1]),
                        categoria: colunas[2]?.trim() || "Outros", // Pega a categoria da coluna C
                        img: colunas[3]?.trim() || ""
                    };
                }).filter(p => !isNaN(p.preco));

                document.getElementById('loader').style.display = 'none';
                filtrarProdutos();
            } catch (error) {
                document.getElementById('loader').innerText = "Erro ao carregar cardápio.";
            }
        }

        // Define o filtro ao clicar no botão
        function setFilter(categoria, elemento) {
            filtroCategoriaAtiva = categoria;
            
            // Estilização dos botões
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            elemento.classList.add('active');
            
            filtrarProdutos(); // Aplica a filtragem
        }

        // Função Mestra de Filtragem (Botão + Barra de Busca)
        function filtrarProdutos() {
            const termoBusca = document.getElementById('search-input').value.toLowerCase().trim();
            
            const filtrados = todosProdutos.filter(produto => {
                // Lógica da Categoria (Botão)
                const bateCategoria = filtroCategoriaAtiva === 'todos' || 
                                     produto.categoria.toLowerCase() === filtroCategoriaAtiva.toLowerCase();
                
                // Lógica da Busca (Texto)
                const bateTexto = produto.nome.toLowerCase().includes(termoBusca) || 
                                  produto.categoria.toLowerCase().includes(termoBusca);
                
                return bateCategoria && bateTexto;
            });

            renderizarCardapio(filtrados);
        }

        function renderizarCardapio(lista) {
            const grid = document.getElementById('cardapio-grid');
            if (lista.length === 0) {
                grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; padding:50px; color:#999;">Nenhum item encontrado nesta categoria.</p>';
                return;
            }
            grid.innerHTML = lista.map(p => `
                <article class="card">
                    <img src="${p.img || 'https://via.placeholder.com/300?text=Sem+Foto'}" alt="${p.nome}" loading="lazy">
                    <div class="card-body">
                        <h3>${p.nome}</h3>
                        <div class="card-footer">
                            <span class="preco">R$ ${p.preco.toFixed(2).replace('.', ',')}</span>
                            <button class="btn-add-simple" onclick="addToCart('${p.nome}', ${p.preco})">Add</button>
                        </div>
                    </div>
                </article>
            `).join('');
        }

        // Funções do Carrinho
        function toggleCart() {
            document.getElementById('side-cart').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function addToCart(nome, preco) {
            if (!carrinho[nome]) {
                carrinho[nome] = { qtd: 1, preco: preco };
            } else {
                carrinho[nome].qtd++;
            }
            renderCart();
        }

        function changeQtd(nome, delta) {
            carrinho[nome].qtd += delta;
            if (carrinho[nome].qtd <= 0) delete carrinho[nome];
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            const footer = document.getElementById('cart-footer');
            const badge = document.getElementById('cart-count');
            const totalVal = document.getElementById('total-val');
            
            list.innerHTML = '';
            let total = 0;
            let itensCount = 0;

            for (let item in carrinho) {
                let subtotal = carrinho[item].qtd * carrinho[item].preco;
                total += subtotal;
                itensCount += carrinho[item].qtd;
                list.innerHTML += `
                    <div class="cart-item">
                        <div>
                            <b>${item}</b><br>
                            <small>R$ ${carrinho[item].preco.toFixed(2).replace('.', ',')}</small>
                        </div>
                        <div class="qtd-btn-group">
                            <button onclick="changeQtd('${item}', -1)">-</button>
                            <span>${carrinho[item].qtd}</span>
                            <button onclick="changeQtd('${item}', 1)">+</button>
                        </div>
                    </div>`;
            }

            badge.innerText = itensCount;
            totalVal.innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
            footer.style.display = total > 0 ? 'block' : 'none';
            if (total === 0) list.innerHTML = '<p style="color:#999; text-align:center; margin-top: 50px;">Seu carrinho está vazio.</p>';
        }

        function enviarPedido() {
            let msg = "🍕 *NOVO PEDIDO* %0A%0A";
            let totalPedido = 0;
            for (let item in carrinho) {
                let sub = carrinho[item].qtd * carrinho[item].preco;
                msg += `✅ *${carrinho[item].qtd}x* ${item} - R$ ${sub.toFixed(2)}%0A`;
                totalPedido += sub;
            }
            msg += `%0A💰 *TOTAL: R$ ${totalPedido.toFixed(2).replace('.', ',')}*`;
            window.open(`https://wa.me/${SEU_TELEFONE}?text=${msg}`, '_blank');
        }

        carregarDados();
    </script>
</body>
</html>
